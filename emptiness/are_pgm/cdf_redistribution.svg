<svg xmlns="http://www.w3.org/2000/svg" width="760" height="620" viewBox="0 0 760 620"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="ax" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94a3b8"/>
    </marker>
    <!-- Key hatching (diagonal lines, indigo) -->
    <pattern id="key-hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#6366f1" stroke-width="1.2" stroke-opacity="0.5"/>
    </pattern>
    <!-- Key hatching for bottom uniform bar (green) -->
    <pattern id="key-hatch-g" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#10b981" stroke-width="1.2" stroke-opacity="0.5"/>
    </pattern>
    <!-- Clipping rect for top panel -->
    <clipPath id="top-box">
      <rect x="60" y="30" width="640" height="180"/>
    </clipPath>
  </defs>

  <rect width="760" height="620" fill="white"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!--  TOP PANEL — Original universe U                   -->
  <!--  Rectangle: keys = PDF (uniform + 2 gaussians)     -->
  <!--  Gray fill = non-keys (complement)                 -->
  <!-- ═══════════════════════════════════════════════════ -->

  <text x="380" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">
    Original universe U
  </text>

  <!-- Bounding rectangle (the universe) -->
  <rect x="60" y="30" width="640" height="180" rx="3"
        fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Non-keys fill: the entire rectangle is light gray = non-keys background -->
  <!-- Keys region: filled area under the PDF curve, clipped to the rectangle -->

  <!-- PDF curve: uniform base (height ~35) + gaussian1 (center 220, σ≈55, peak +95)
       + gaussian2 (center 480, σ≈70, peak +110) -->
  <!-- We draw the filled key region from bottom (y=210) up to the PDF curve -->
  <!-- The PDF path goes left-to-right along the top of the key density, then back along the bottom -->

  <!-- Key density filled region (hatched indigo) -->
  <path d="M 60,210
           L 60,175
           C 80,175 100,172 120,168
           C 140,162 160,140 180,118
           C 195,100 210,90  220,88
           C 230,90  245,100 260,118
           C 275,135 290,150 310,158
           C 330,162 350,163 370,160
           C 390,155 410,138 430,115
           C 450,92  465,78  480,75
           C 495,78  510,92  530,115
           C 550,138 570,155 590,162
           C 610,166 630,170 650,172
           C 670,174 690,175 700,175
           L 700,210 Z"
        fill="url(#key-hatch)" stroke="none" clip-path="url(#top-box)"/>

  <!-- PDF outline (solid indigo line) -->
  <path d="M 60,175
           C 80,175 100,172 120,168
           C 140,162 160,140 180,118
           C 195,100 210,90  220,88
           C 230,90  245,100 260,118
           C 275,135 290,150 310,158
           C 330,162 350,163 370,160
           C 390,155 410,138 430,115
           C 450,92  465,78  480,75
           C 495,78  510,92  530,115
           C 550,138 570,155 590,162
           C 610,166 630,170 650,172
           C 670,174 690,175 700,175"
        fill="none" stroke="#6366f1" stroke-width="2" clip-path="url(#top-box)"/>

  <!-- Labels inside top panel -->
  <text x="220" y="80" text-anchor="middle" font-size="11" font-weight="500" fill="#4f46e5">cluster 1</text>
  <text x="480" y="67" text-anchor="middle" font-size="11" font-weight="500" fill="#4f46e5">cluster 2</text>

  <!-- Non-keys label (in the gray area above the curve, between clusters) -->
  <text x="350" y="52" text-anchor="middle" font-size="10.5" fill="#94a3b8" font-style="italic">non-keys</text>
  <text x="150" y="52" text-anchor="middle" font-size="10.5" fill="#94a3b8" font-style="italic">non-keys</text>
  <text x="600" y="52" text-anchor="middle" font-size="10.5" fill="#94a3b8" font-style="italic">non-keys</text>

  <!-- Axis label -->
  <text x="380" y="226" text-anchor="middle" font-size="11" fill="#64748b">Universe U — key density (hatched) vs non-keys (gray)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!--  ARROW                                             -->
  <!-- ═══════════════════════════════════════════════════ -->

  <line x1="380" y1="242" x2="380" y2="276" stroke="#475569" stroke-width="2"/>
  <polygon points="374,273 380,286 386,273" fill="#475569"/>
  <text x="396" y="266" font-size="12" font-weight="500" fill="#475569">apply CDF  h(x)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!--  MIDDLE PANEL — Non-keys curve after CDF           -->
  <!--  Inverse of the original PDF: where keys were      -->
  <!--  dense → few non-keys (dips); where keys were      -->
  <!--  sparse → many non-keys (peaks)                    -->
  <!-- ═══════════════════════════════════════════════════ -->

  <text x="380" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">
    After CDF mapping — non-keys redistribution
  </text>

  <!-- Y-axis -->
  <line x1="60" y1="315" x2="60" y2="500" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- X-axis (baseline for the non-keys curve, also top of the uniform key bar) -->
  <line x1="60" y1="500" x2="700" y2="500" stroke="#94a3b8" stroke-width="1"/>

  <!-- Non-keys curve: INVERSE of original PDF.
       Original PDF had peaks at x=220, x=480.
       Inverted: valleys at corresponding mapped positions, peaks between them.
       After CDF the x-axis is now the mapped universe U′.
       Cluster 1 (originally narrow, x=160-280) is now stretched to ~x=100-300.
       Cluster 2 (originally x=380-580) is now stretched to ~x=300-640.
       Gaps get compressed. -->

  <!-- Filled non-keys region (light red/pink) from baseline up to the inverse curve -->
  <path d="M 60,500
           L 60,380
           C 75,385  90,395  110,415
           C 130,438 150,460 170,475
           C 190,485 210,490 230,492
           C 250,490 270,485 290,478
           C 305,472 315,460 325,438
           C 335,415 340,395 350,378
           C 358,365 365,358 380,355
           C 395,358 402,365 410,378
           C 420,395 425,415 435,438
           C 445,460 455,472 470,478
           C 490,485 520,490 550,492
           C 575,490 595,486 615,478
           C 630,468 645,450 655,430
           C 665,410 675,395 685,385
           C 695,380 700,378 700,378
           L 700,500 Z"
        fill="#fecaca" fill-opacity="0.5" stroke="none"/>

  <!-- Non-keys curve outline -->
  <path d="M 60,380
           C 75,385  90,395  110,415
           C 130,438 150,460 170,475
           C 190,485 210,490 230,492
           C 250,490 270,485 290,478
           C 305,472 315,460 325,438
           C 335,415 340,395 350,378
           C 358,365 365,358 380,355
           C 395,358 402,365 410,378
           C 420,395 425,415 435,438
           C 445,460 455,472 470,478
           C 490,485 520,490 550,492
           C 575,490 595,486 615,478
           C 630,468 645,450 655,430
           C 665,410 675,395 685,385
           C 695,380 700,378 700,378"
        fill="none" stroke="#ef4444" stroke-width="2"/>

  <!-- Labels on the non-keys curve -->
  <!-- Valleys = where clusters were (few non-keys now) -->
  <text x="230" y="488" text-anchor="middle" font-size="10" fill="#059669" font-weight="500">few non-keys</text>
  <text x="540" y="488" text-anchor="middle" font-size="10" fill="#059669" font-weight="500">few non-keys</text>

  <!-- Peaks = where gaps were (many non-keys compressed here) -->
  <text x="100" y="370" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="500">many non-keys</text>
  <text x="380" y="345" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="500">many non-keys</text>
  <text x="690" y="370" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="500">many non-keys</text>

  <!-- Y-axis label -->
  <text x="42" y="410" text-anchor="middle" font-size="10" fill="#64748b"
        transform="rotate(-90, 42, 410)">non-key density</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!--  BOTTOM — Uniform key bar                          -->
  <!--  Keys are now uniformly distributed in U′          -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Uniform key bar: thin rectangle below the non-keys curve -->
  <rect x="60" y="500" width="640" height="28" rx="2"
        fill="url(#key-hatch-g)" stroke="#10b981" stroke-width="1.5"/>

  <!-- X-axis arrow below the bar -->
  <line x1="60" y1="540" x2="708" y2="540" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ax)"/>
  <text x="716" y="540" font-size="12" fill="#64748b" dominant-baseline="middle">U′</text>

  <!-- Label inside the bar -->
  <text x="380" y="518" text-anchor="middle" font-size="11" fill="#059669" font-weight="500">
    keys ≈ uniform after CDF
  </text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!--  BOTTOM CAPTION                                    -->
  <!-- ═══════════════════════════════════════════════════ -->

  <text x="380" y="565" text-anchor="middle" font-size="11" fill="#64748b">
    CDF stretches dense regions → keys become uniform, non-keys concentrate in former gaps
  </text>
  <text x="380" y="582" text-anchor="middle" font-size="11" fill="#64748b">
    Queries follow key distribution → rarely hit non-key peaks → lower effective FPR
  </text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!--  LEGEND                                            -->
  <!-- ═══════════════════════════════════════════════════ -->

  <rect x="200" y="598" width="18" height="12" fill="url(#key-hatch)" stroke="#6366f1" stroke-width="0.5"/>
  <text x="224" y="609" font-size="10" fill="#475569">keys (original)</text>

  <rect x="330" y="598" width="18" height="12" fill="#fecaca" fill-opacity="0.5" stroke="#ef4444" stroke-width="0.5"/>
  <text x="354" y="609" font-size="10" fill="#475569">non-keys (after CDF)</text>

  <rect x="496" y="598" width="18" height="12" fill="url(#key-hatch-g)" stroke="#10b981" stroke-width="0.5"/>
  <text x="520" y="609" font-size="10" fill="#475569">keys (after CDF)</text>
</svg>
