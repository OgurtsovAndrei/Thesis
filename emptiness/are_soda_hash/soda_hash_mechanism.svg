<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="sans-serif" font-size="13">

  <text x="380" y="22" text-anchor="middle" font-size="15" font-weight="bold">SODA hash: h(x) = (u(⌊x/r⌋) + x) mod r</text>

  <!-- ================================ -->
  <!-- Original universe U (top)        -->
  <!-- ================================ -->
  <text x="20" y="58" font-weight="bold" font-size="13">U (original universe)</text>

  <!-- axis -->
  <line x1="60" y1="85" x2="720" y2="85" stroke="#333" stroke-width="1.5"/>

  <!-- block boundaries -->
  <line x1="60" y1="75" x2="60" y2="95" stroke="#999" stroke-width="1"/>
  <line x1="225" y1="75" x2="225" y2="95" stroke="#999" stroke-width="1"/>
  <line x1="390" y1="75" x2="390" y2="95" stroke="#999" stroke-width="1"/>
  <line x1="555" y1="75" x2="555" y2="95" stroke="#999" stroke-width="1"/>
  <line x1="720" y1="75" x2="720" y2="95" stroke="#999" stroke-width="1"/>

  <!-- block labels -->
  <text x="142" y="112" text-anchor="middle" font-size="10" fill="#666">block 0</text>
  <text x="307" y="112" text-anchor="middle" font-size="10" fill="#666">block 1</text>
  <text x="472" y="112" text-anchor="middle" font-size="10" fill="#666">block 2</text>
  <text x="637" y="112" text-anchor="middle" font-size="10" fill="#666">block 3</text>

  <!-- block fills -->
  <rect x="60" y="76" width="165" height="18" fill="#e3f2fd" opacity="0.5" rx="2"/>
  <rect x="225" y="76" width="165" height="18" fill="#fce4ec" opacity="0.5" rx="2"/>
  <rect x="390" y="76" width="165" height="18" fill="#e8f5e9" opacity="0.5" rx="2"/>
  <rect x="555" y="76" width="165" height="18" fill="#fff3e0" opacity="0.5" rx="2"/>

  <!-- keys in blocks -->
  <!-- block 0: keys at ~90, ~130 -->
  <circle cx="100" cy="85" r="5" fill="#1565c0"/>
  <circle cx="145" cy="85" r="5" fill="#1565c0"/>
  <!-- block 1: keys at ~260, ~300, ~340 -->
  <circle cx="270" cy="85" r="5" fill="#c62828"/>
  <circle cx="310" cy="85" r="5" fill="#c62828"/>
  <circle cx="350" cy="85" r="5" fill="#c62828"/>
  <!-- block 2: key at ~470 -->
  <circle cx="480" cy="85" r="5" fill="#2e7d32"/>
  <!-- block 3: keys at ~600, ~680 -->
  <circle cx="610" cy="85" r="5" fill="#e65100"/>
  <circle cx="685" cy="85" r="5" fill="#e65100"/>

  <!-- ================================ -->
  <!-- Shift arrows (middle section)    -->
  <!-- ================================ -->
  <text x="20" y="155" font-weight="bold" font-size="13">Per-block cyclic shift</text>
  <text x="20" y="173" font-size="11" fill="#555">Each block gets a random offset u(block_idx)</text>

  <!-- shift indicators per block -->
  <!-- block 0: shift by u₀ (small, e.g. +20) -->
  <rect x="70" y="195" width="145" height="30" fill="#e3f2fd" opacity="0.4" rx="3"/>
  <text x="142" y="215" text-anchor="middle" font-size="11" fill="#1565c0">u₀ = +35</text>
  <line x1="100" y1="225" x2="135" y2="225" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr_blue)"/>

  <!-- block 1: shift by u₁ (large, e.g. +120) -->
  <rect x="235" y="195" width="145" height="30" fill="#fce4ec" opacity="0.4" rx="3"/>
  <text x="307" y="215" text-anchor="middle" font-size="11" fill="#c62828">u₁ = +110</text>
  <line x1="265" y1="225" x2="375" y2="225" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr_red)"/>

  <!-- block 2: shift by u₂ (medium, e.g. +60) -->
  <rect x="400" y="195" width="145" height="30" fill="#e8f5e9" opacity="0.4" rx="3"/>
  <text x="472" y="215" text-anchor="middle" font-size="11" fill="#2e7d32">u₂ = +70</text>
  <line x1="430" y1="225" x2="500" y2="225" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr_green)"/>

  <!-- block 3: shift by u₃ -->
  <rect x="565" y="195" width="145" height="30" fill="#fff3e0" opacity="0.4" rx="3"/>
  <text x="637" y="215" text-anchor="middle" font-size="11" fill="#e65100">u₃ = +140 ≡ −116 (mod r)</text>
  <line x1="670" y1="225" x2="590" y2="225" stroke="#e65100" stroke-width="1.5" marker-end="url(#arr_orange)"/>

  <!-- arrow markers -->
  <defs>
    <marker id="arr_blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1565c0"/></marker>
    <marker id="arr_red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#c62828"/></marker>
    <marker id="arr_green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2e7d32"/></marker>
    <marker id="arr_orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#e65100"/></marker>
  </defs>

  <!-- ================================ -->
  <!-- Projected universe [r] (bottom)  -->
  <!-- ================================ -->
  <text x="20" y="280" font-weight="bold" font-size="13">[r] (projected universe, one block)</text>
  <text x="20" y="298" font-size="11" fill="#555">h(x) = (u(⌊x/r⌋) + x) mod r — order preserved within block, scrambled across</text>

  <!-- axis -->
  <line x1="60" y1="330" x2="720" y2="330" stroke="#333" stroke-width="2"/>
  <text x="60" y="350" font-size="10" fill="#666">0</text>
  <text x="720" y="350" text-anchor="end" font-size="10" fill="#666">r</text>

  <!-- mapped keys — scattered, but within-block order preserved -->
  <!-- block 0 keys: 100→135, 145→180 (shifted +35, mod 165 scaled to 660) -->
  <circle cx="135" cy="330" r="5" fill="#1565c0"/>
  <circle cx="180" cy="330" r="5" fill="#1565c0"/>

  <!-- block 1 keys: shifted +110 -->
  <circle cx="370" cy="330" r="5" fill="#c62828"/>
  <circle cx="410" cy="330" r="5" fill="#c62828"/>
  <circle cx="450" cy="330" r="5" fill="#c62828"/>

  <!-- block 2 key: shifted +70 -->
  <circle cx="560" cy="330" r="5" fill="#2e7d32"/>

  <!-- block 3 keys: shifted +15, overlapping slightly with block 1 tail -->
  <circle cx="430" cy="330" r="5" fill="#e65100"/>
  <circle cx="490" cy="330" r="5" fill="#e65100"/>

  <!-- within-block order brackets -->
  <line x1="135" y1="340" x2="180" y2="340" stroke="#1565c0" stroke-width="1.5"/>
  <text x="157" y="358" text-anchor="middle" font-size="9" fill="#1565c0">order ✓</text>

  <line x1="370" y1="340" x2="450" y2="340" stroke="#c62828" stroke-width="1.5"/>
  <text x="410" y="358" text-anchor="middle" font-size="9" fill="#c62828">order ✓</text>

  <line x1="430" y1="345" x2="490" y2="345" stroke="#e65100" stroke-width="1.5"/>
  <text x="460" y="368" text-anchor="middle" font-size="9" fill="#e65100">order ✓</text>

  <!-- interleaving annotation -->
  <text x="440" y="382" text-anchor="middle" font-size="9" fill="#555" font-style="italic">blocks interleaved</text>

  <!-- ================================ -->
  <!-- Key insight annotation           -->
  <!-- ================================ -->
  <rect x="60" y="385" width="660" height="120" fill="#f5f5f5" rx="6" stroke="#ddd" stroke-width="1"/>

  <text x="80" y="410" font-weight="bold" font-size="12">Why this works:</text>
  <text x="80" y="432" font-size="11" fill="#333">Within a block: keys keep their relative order (cyclic shift). No information is lost.</text>
  <text x="80" y="452" font-size="11" fill="#333">Across blocks: random offsets scramble relative positions. Two keys from different</text>
  <text x="80" y="472" font-size="11" fill="#333">blocks collide with probability exactly 1/r — independent of how close they were in U.</text>
  <text x="80" y="496" font-size="11" fill="#555" font-style="italic">→ FPR guarantee holds for any data distribution (sequential, clustered, adversarial).</text>

</svg>
