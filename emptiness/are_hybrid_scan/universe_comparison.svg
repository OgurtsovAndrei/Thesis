<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="system-ui, -apple-system, sans-serif">
  <rect width="780" height="340" fill="white"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Global Filter vs Per-Cluster Filters</text>

  <!-- === LEFT: Global filter === -->
  <g transform="translate(30, 55)">
    <text x="160" y="0" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">Single global filter</text>

    <!-- Full 64-bit bar -->
    <rect x="0" y="16" width="320" height="32" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="4" y="37" font-size="10" fill="#991b1b">0</text>
    <text x="305" y="37" font-size="10" fill="#991b1b" text-anchor="end">2^64</text>
    <text x="160" y="37" font-size="11" font-weight="600" fill="#dc2626" text-anchor="middle">Universe U</text>

    <!-- Small key clusters inside -->
    <rect x="30" y="20" width="24" height="24" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="120" y="20" width="18" height="24" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="250" y="20" width="30" height="24" rx="2" fill="#3b82f6" opacity="0.5"/>

    <!-- Spread arrow -->
    <line x1="30" y1="58" x2="280" y2="58" stroke="#991b1b" stroke-width="1.2"/>
    <line x1="30" y1="54" x2="30" y2="62" stroke="#991b1b" stroke-width="1.2"/>
    <line x1="280" y1="54" x2="280" y2="62" stroke="#991b1b" stroke-width="1.2"/>
    <text x="155" y="72" text-anchor="middle" font-size="10" fill="#991b1b">spread M &gt;&gt; K bits</text>

    <!-- Verdict -->
    <rect x="40" y="86" width="240" height="40" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
    <text x="160" y="103" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">M &gt; K &#x2192; hash required</text>
    <text x="160" y="118" text-anchor="middle" font-size="11" fill="#991b1b">FPR = epsilon,  BPK = log(L/epsilon)</text>
  </g>

  <!-- === Divider === -->
  <line x1="390" y1="50" x2="390" y2="185" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- === RIGHT: Per-cluster filters === -->
  <g transform="translate(420, 55)">
    <text x="160" y="0" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">Per-cluster filters (after DBSCAN)</text>

    <!-- Cluster 1 -->
    <rect x="0" y="16" width="70" height="24" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="6" y="20" width="24" height="16" rx="2" fill="#3b82f6" opacity="0.5"/>
    <text x="35" y="32" font-size="9" fill="#1d4ed8" text-anchor="middle">M1 &lt;&lt; K</text>

    <!-- Cluster 2 -->
    <rect x="90" y="16" width="55" height="24" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="96" y="20" width="18" height="16" rx="2" fill="#3b82f6" opacity="0.5"/>
    <text x="117" y="32" font-size="9" fill="#1d4ed8" text-anchor="middle">M2 &lt;&lt; K</text>

    <!-- Cluster 3 -->
    <rect x="165" y="16" width="80" height="24" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="171" y="20" width="30" height="16" rx="2" fill="#3b82f6" opacity="0.5"/>
    <text x="205" y="32" font-size="9" fill="#1d4ed8" text-anchor="middle">M3 &lt;&lt; K</text>

    <!-- Labels under clusters -->
    <text x="35" y="55" text-anchor="middle" font-size="9" fill="#64748b">exact</text>
    <text x="117" y="55" text-anchor="middle" font-size="9" fill="#64748b">exact</text>
    <text x="205" y="55" text-anchor="middle" font-size="9" fill="#64748b">exact</text>

    <!-- Fallback (scattered dots) -->
    <g transform="translate(270, 16)">
      <rect x="0" y="0" width="55" height="24" rx="4" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
      <circle cx="10" cy="12" r="2" fill="#9333ea" opacity="0.5"/>
      <circle cx="20" cy="12" r="2" fill="#9333ea" opacity="0.5"/>
      <circle cx="32" cy="12" r="2" fill="#9333ea" opacity="0.5"/>
      <circle cx="44" cy="12" r="2" fill="#9333ea" opacity="0.5"/>
      <text x="27" y="55" text-anchor="middle" font-size="9" fill="#7e22ce">fallback</text>
    </g>

    <!-- Verdict: clusters -->
    <rect x="10" y="86" width="240" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="130" y="103" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">M_i &#x2264; K &#x2192; no hash needed</text>
    <text x="130" y="118" text-anchor="middle" font-size="11" fill="#1e40af">FPR = 0,  BPK ~ K per cluster key</text>

    <!-- Verdict: fallback -->
    <rect x="255" y="86" width="80" height="40" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1.2"/>
    <text x="295" y="103" text-anchor="middle" font-size="10" font-weight="600" fill="#7e22ce">Trunc</text>
    <text x="295" y="118" text-anchor="middle" font-size="9" fill="#7e22ce">BPK = log(1/&#x3b5;)</text>
  </g>

  <!-- === Bottom: before/after number line === -->
  <g transform="translate(30, 210)">
    <text x="390" y="0" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">Key space view</text>

    <!-- Full number line -->
    <line x1="20" y1="28" x2="720" y2="28" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="20" y="22" font-size="9" fill="#94a3b8" text-anchor="middle">0</text>
    <text x="720" y="22" font-size="9" fill="#94a3b8" text-anchor="middle">2^64</text>

    <!-- Cluster regions (filled) -->
    <rect x="60" y="20" width="70" height="16" rx="3" fill="#3b82f6" opacity="0.3"/>
    <rect x="220" y="20" width="50" height="16" rx="3" fill="#3b82f6" opacity="0.3"/>
    <rect x="480" y="20" width="90" height="16" rx="3" fill="#3b82f6" opacity="0.3"/>

    <!-- Scattered noise dots -->
    <circle cx="160" cy="28" r="2.5" fill="#9333ea" opacity="0.4"/>
    <circle cx="310" cy="28" r="2.5" fill="#9333ea" opacity="0.4"/>
    <circle cx="370" cy="28" r="2.5" fill="#9333ea" opacity="0.4"/>
    <circle cx="420" cy="28" r="2.5" fill="#9333ea" opacity="0.4"/>
    <circle cx="620" cy="28" r="2.5" fill="#9333ea" opacity="0.4"/>
    <circle cx="670" cy="28" r="2.5" fill="#9333ea" opacity="0.4"/>
    <circle cx="700" cy="28" r="2.5" fill="#9333ea" opacity="0.4"/>

    <!-- Cluster zoom-in brackets -->
    <line x1="60" y1="42" x2="60" y2="54" stroke="#3b82f6" stroke-width="1"/>
    <line x1="130" y1="42" x2="130" y2="54" stroke="#3b82f6" stroke-width="1"/>
    <line x1="60" y1="54" x2="95" y2="72" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="130" y1="54" x2="95" y2="72" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3,2"/>

    <line x1="220" y1="42" x2="220" y2="54" stroke="#3b82f6" stroke-width="1"/>
    <line x1="270" y1="42" x2="270" y2="54" stroke="#3b82f6" stroke-width="1"/>
    <line x1="220" y1="54" x2="245" y2="72" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="270" y1="54" x2="245" y2="72" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3,2"/>

    <line x1="480" y1="42" x2="480" y2="54" stroke="#3b82f6" stroke-width="1"/>
    <line x1="570" y1="42" x2="570" y2="54" stroke="#3b82f6" stroke-width="1"/>
    <line x1="480" y1="54" x2="525" y2="72" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="570" y1="54" x2="525" y2="72" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3,2"/>

    <!-- Zoomed mini-universes -->
    <rect x="65" y="74" width="60" height="18" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="95" y="87" text-anchor="middle" font-size="8" font-weight="600" fill="#1d4ed8">exact ERE</text>

    <rect x="215" y="74" width="60" height="18" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="245" y="87" text-anchor="middle" font-size="8" font-weight="600" fill="#1d4ed8">exact ERE</text>

    <rect x="495" y="74" width="60" height="18" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="525" y="87" text-anchor="middle" font-size="8" font-weight="600" fill="#1d4ed8">exact ERE</text>

    <!-- Noise fallback label -->
    <text x="420" y="104" text-anchor="middle" font-size="9" fill="#7e22ce">scattered keys &#x2192; trunc / SODA fallback</text>
  </g>
</svg>
