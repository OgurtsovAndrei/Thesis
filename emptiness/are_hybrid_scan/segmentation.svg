<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="clusterFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="noiseFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.03"/>
    </linearGradient>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
    </marker>
    <marker id="arrowP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#9333ea" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="380" fill="white"/>

  <!-- Plot area -->
  <g transform="translate(50, 20)">
    <!-- Axes -->
    <line x1="0" y1="280" x2="720" y2="280" stroke="#334155" stroke-width="1.5"/>
    <line x1="0" y1="280" x2="0" y2="0" stroke="#334155" stroke-width="1.5"/>
    <text x="360" y="310" text-anchor="middle" font-size="13" fill="#334155">Key space</text>
    <text x="-16" y="145" text-anchor="middle" font-size="13" fill="#334155" transform="rotate(-90, -16, 145)">Density</text>

    <!-- Noise background regions (between clusters) -->
    <rect x="0" y="255" width="80" height="25" fill="url(#noiseFill)" rx="2"/>
    <rect x="180" y="255" width="100" height="25" rx="2" fill="url(#noiseFill)"/>
    <rect x="390" y="255" width="70" height="25" rx="2" fill="url(#noiseFill)"/>
    <rect x="560" y="255" width="160" height="25" rx="2" fill="url(#noiseFill)"/>

    <!-- Cluster bounding boxes -->
    <!-- Cluster 1: narrow, tall -->
    <rect x="75" y="52" width="110" height="228" fill="url(#clusterFill)" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6,3" rx="4"/>
    <!-- Cluster 2: wide, medium -->
    <rect x="275" y="108" width="120" height="172" fill="url(#clusterFill)" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6,3" rx="4"/>
    <!-- Cluster 3: medium, tall -->
    <rect x="455" y="72" width="110" height="208" fill="url(#clusterFill)" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6,3" rx="4"/>

    <!-- Density curve: 3 Gaussians + uniform floor -->
    <!-- Built as a single smooth path -->
    <path d="
      M 0,268
      C 20,268 50,267 70,266
      C 80,264 90,240 100,180
      C 110,110 120,60 130,55
      C 140,60 150,110 160,180
      C 170,240 180,264 190,267
      C 210,268 240,268 260,267
      C 275,265 290,245 305,195
      C 315,155 325,120 335,112
      C 345,120 355,155 365,195
      C 380,245 390,265 400,267
      C 415,268 430,268 445,267
      C 455,264 465,235 480,165
      C 490,110 500,78 510,75
      C 520,78 530,110 540,165
      C 550,235 560,264 570,267
      C 590,268 640,268 680,268
      L 720,268
    " fill="none" stroke="#1e293b" stroke-width="2.2" stroke-linejoin="round"/>

    <!-- Uniform noise floor line (dashed) -->
    <line x1="0" y1="268" x2="720" y2="268" stroke="#9333ea" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
    <text x="670" y="260" font-size="10" fill="#9333ea" opacity="0.7">noise floor</text>

    <!-- Cluster labels -->
    <text x="130" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Cluster 1</text>
    <text x="335" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Cluster 2</text>
    <text x="510" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Cluster 3</text>

    <!-- Arrows from clusters to label -->
    <line x1="130" y1="285" x2="130" y2="330" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#arrowB)"/>
    <line x1="335" y1="285" x2="335" y2="330" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#arrowB)"/>
    <line x1="510" y1="285" x2="510" y2="330" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#arrowB)"/>

    <!-- Arrows from noise to label -->
    <line x1="40" y1="285" x2="40" y2="359" stroke="#9333ea" stroke-width="1.3" marker-end="url(#arrowP)"/>
    <line x1="230" y1="285" x2="230" y2="359" stroke="#9333ea" stroke-width="1.3" marker-end="url(#arrowP)"/>
    <line x1="425" y1="285" x2="425" y2="359" stroke="#9333ea" stroke-width="1.3" marker-end="url(#arrowP)"/>
    <line x1="640" y1="285" x2="640" y2="359" stroke="#9333ea" stroke-width="1.3" marker-end="url(#arrowP)"/>

    <!-- Bottom labels -->
    <rect x="60" y="330" width="490" height="22" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="305" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Adaptive ARE  (spread &lt; 2^K  -->  exact mode, FPR = 0)</text>

    <rect x="0" y="362" width="720" height="22" rx="4" fill="#faf5ff" stroke="#9333ea" stroke-width="1"/>
    <text x="360" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#7e22ce">Fallback: Trunc (uniform gaps >> phantom size) or SODA (otherwise)</text>
  </g>
</svg>
